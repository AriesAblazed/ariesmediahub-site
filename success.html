<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Aries Media Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .success-wrap {
      max-width: 480px;
    }
    .success-icon {
      font-size: 2rem;
      color: var(--accent-bright);
      margin-bottom: 1.5rem;
      letter-spacing: 0.3em;
    }
    .success-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .success-rule {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
      margin: 0 auto 1.5rem;
    }
    .success-msg {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 300;
      margin-bottom: 2.5rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="success-wrap">
    <div class="success-icon">&#9670;&#9670;&#9670;</div>
    <h1 class="success-title">Message Received</h1>
    <div class="success-rule"></div>
    <p class="success-msg">
      Thank you for reaching out. I'll review your message and respond within 1–2 business days.
    </p>
    <a href="/" class="btn-primary">Return Home</a>
  </div>
</body>
</html>
